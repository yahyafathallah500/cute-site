<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>goodnight Lulu</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #3b0764);
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    transition: 0.4s;
}

/* flash effect */
.flash {
    background: #ff4da6 !important;
}

/* floating hearts background */
.heart-bg {
    position: absolute;
    color: rgba(255, 77, 109, 0.4);
    font-size: 18px;
    animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* cursor hearts */
.cursor-heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 14px;
    pointer-events: none;
    animation: pop 1s ease-out forwards;
}

@keyframes pop {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
}

/* card */
.card {
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 20px;
    max-width: 340px;
    backdrop-filter: blur(10px);
    z-index: 10;
}

h1 {
    font-size: 32px;
}

button {
    margin-top: 15px;
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:active {
    transform: scale(0.95);
}

img {
    width: 150px;
    border-radius: 15px;
    margin-top: 10px;
}

/* popup */
.popup {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.15);
    padding: 10px 20px;
    border-radius: 12px;
    opacity: 0;
    transition: 0.5s;
}
</style>
</head>

<body>

<div class="popup" id="popup">Lulu… you’re kinda special 🤍</div>

<div class="card">
    <h1 id="title"></h1>
    <p>sorry if I annoyed you earlier Lulu… sleep well 🤍</p>

    <button onclick="love()">I wuv you</button>

    <img src="https://i.pinimg.com/474x/08/e6/eb/08e6eb18bfd16b7b3f5df008d8b53a8c.jpg" />
</div>

<script>

/* typing effect */
let text = "goodnight Lulu 💤";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("title").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 120);
    }
}
type();

/* floating hearts ALWAYS */
function createHearts() {
    let heart = document.createElement("div");
    heart.className = "heart-bg";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    heart.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 9000);
}
setInterval(createHearts, 300);

/* cursor hearts */
document.addEventListener("mousemove", (e) => {
    let h = document.createElement("div");
    h.className = "cursor-heart";
    h.innerHTML = "❤️";
    h.style.left = e.pageX + "px";
    h.style.top = e.pageY + "px";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 800);
});

/* click effect */
function love() {

    document.body.classList.add("flash");
    setTimeout(() => document.body.classList.remove("flash"), 400);

    document.getElementById("popup").style.opacity = 1;
    setTimeout(() => {
        document.getElementById("popup").style.opacity = 0;
    }, 2000);
}

</script>

</body>
</html>
